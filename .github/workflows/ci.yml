name: CI

on:
  push:
    branches: [main, 'feature/**', 'feat/**']
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: studiohub
          POSTGRES_USER: infinity
          POSTGRES_PASSWORD: infinity123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install

      - run: pnpm lint

      - run: pnpm test
        env:
          DATABASE_URL: postgresql://infinity:infinity123@localhost:5432/studiohub
          JWT_SECRET: ci-jwt-secret-for-testing

      - run: pnpm test:server
        env:
          DATABASE_URL: postgresql://infinity:infinity123@localhost:5432/studiohub
          JWT_SECRET: ci-jwt-secret-for-testing

      - run: pnpm build