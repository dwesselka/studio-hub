name: Deploy

on:
  push:
    tags: ['v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install
      - run: pnpm build

      - name: Deploy Frontend
        run: echo "Deploy do frontend para Vercel/Cloudflare"

      - name: Deploy Backend
        run: echo "Deploy do backend para Cloud Run/Railway"