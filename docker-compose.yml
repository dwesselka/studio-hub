services:
  postgres:
    image: postgres:16-alpine
    container_name: infinity-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: infinity_partner
      POSTGRES_USER: infinity
      POSTGRES_PASSWORD: infinity123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
